<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Upload Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --saffron: #ff8e42;
      --bg-main: #060a12;
      --bg-card: #111a2a;
      --bg-input: #0b121d;
      --text-main: #f3f6fb;
      --text-soft: #cdd6e4;
      --text-muted: #97a6bc;
      --border: #2a3a53;
      --ok: #8be8bd;
      --error: #ff9ea6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 142, 66, 0.14), transparent 24%),
        radial-gradient(circle at 86% 8%, rgba(104, 179, 255, 0.16), transparent 22%),
        linear-gradient(165deg, #050910 0%, #0a1220 55%, #060b13 100%);
      padding: 22px;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }
    .card {
      margin-top: 18px;
      background: linear-gradient(180deg, rgba(19, 28, 43, 0.9) 0%, rgba(14, 20, 32, 0.95) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
    }
    h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      margin-bottom: 8px;
    }
    .sub {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      color: var(--text-soft);
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg-input);
      color: var(--text-main);
      font: inherit;
      outline: none;
      padding: 11px 13px;
    }
    input[type="text"]::placeholder,
    textarea::placeholder {
      color: #7f91ab;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    input:focus,
    textarea:focus {
      border-color: var(--saffron);
      box-shadow: 0 0 0 3px rgba(255, 142, 66, 0.18);
    }
    .btn {
      background: linear-gradient(135deg, var(--saffron) 0%, #ff6a3d 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    #result {
      margin-top: 14px;
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: rgba(104, 179, 255, 0.1);
      color: var(--text-soft);
      font-size: 14px;
      display: none;
    }
    #result.success {
      color: var(--ok);
      border-color: rgba(76, 215, 159, 0.4);
      background: rgba(76, 215, 159, 0.12);
    }
    #result.error {
      color: var(--error);
      border-color: rgba(255, 124, 134, 0.4);
      background: rgba(255, 124, 134, 0.12);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Upload Blog Test</h1>
      <p class="sub">Quick testing page for image/video upload + blog save API flow.</p>

      <div class="field">
        <label for="title">Title *</label>
        <input type="text" id="title" placeholder="Enter blog title">
      </div>

      <div class="field">
        <label for="description">Description *</label>
        <textarea id="description" placeholder="Enter blog description"></textarea>
      </div>

      <div class="field">
        <label for="imageInput">Image *</label>
        <input type="file" id="imageInput" accept="image/*">
      </div>

      <div class="field">
        <label for="videoInput">Video (optional)</label>
        <input type="file" id="videoInput" accept="video/*">
      </div>

      <div class="field">
        <label for="social">Social Link</label>
        <input type="text" id="social" placeholder="https://...">
      </div>

      <button class="btn" id="submitBtn" onclick="submitBlog()">Submit Blog</button>
      <p id="result" aria-live="polite"></p>
    </section>
  </main>

  <script>
    function setResult(msg, type = "") {
      const el = document.getElementById("result");
      el.style.display = "block";
      el.className = type;
      el.innerHTML = msg;
    }

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("http://localhost:5000/api/upload", {
        method: "POST",
        body: formData
      });

      const text = await res.text();
      console.log("UPLOAD RESPONSE:", text);

      if (!res.ok) {
        throw new Error(text);
      }

      return JSON.parse(text).url;
    }

    async function submitBlog() {
      const btn = document.getElementById("submitBtn");
      try {
        const title = document.getElementById("title").value.trim();
        const description = document.getElementById("description").value.trim();
        const social = document.getElementById("social").value.trim();

        const imageFile = document.getElementById("imageInput").files[0];
        const videoFile = document.getElementById("videoInput").files[0];

        if (!title || !description || !imageFile) {
          alert("Title, Description and Image are required");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Processing...";

        setResult("Uploading image...");
        const imageUrl = await uploadFile(imageFile);

        let videoUrl = "";
        if (videoFile) {
          setResult("Uploading video...");
          videoUrl = await uploadFile(videoFile);
        }

        setResult("Saving blog...");
        const res = await fetch("http://localhost:5000/api/add-blog", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title,
            description,
            image: imageUrl,
            video: videoUrl,
            social_link: social
          })
        });

        const text = await res.text();
        console.log("BLOG RESPONSE:", text);

        if (!res.ok) {
          throw new Error(text);
        }

        setResult(
          "\u2705 Blog Added Successfully!<br><a href=\"" + imageUrl + "\" target=\"_blank\" style=\"color:#ffc89b\">View Image</a>",
          "success"
        );
      } catch (err) {
        console.error("FRONTEND ERROR:", err);
        setResult("Error: " + err.message, "error");
        alert("Error: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Submit Blog";
      }
    }
  </script>
</body>
</html>
