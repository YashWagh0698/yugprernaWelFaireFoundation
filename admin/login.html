<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – YugPrerna</title>
    <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
    <header>
        <h1>YugPrerna Admin</h1>
    </header>
    <main>
        <section style="max-width:400px;margin:0 auto">
            <h2>Admin Login</h2>
            <!-- The original JS referenced 'loginForm' but there was no form with that id -->
            <form id="loginForm">
                <div style="margin-bottom:16px">
                    <label for="username">Username</label><br>
                    <input id="username" type="text" required style="width:100%;padding:8px;margin-top:4px">
                </div>
                <div style="margin-bottom:16px">
                    <label for="password">Password</label><br>
                    <input id="password" type="password" required style="width:100%;padding:8px;margin-top:4px">
                </div>
                <button type="submit" style="width:100%;padding:12px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;cursor:pointer">
                    Log in
                </button>
                <p id="error-msg" style="color:red;display:none">Invalid credentials</p>
            </form>
        </section>
    </main>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const res = await fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });

        const data = await res.json();

        if (data.success) {
            window.location.href = '/admin/dashboard';
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    });
    </script>
</body>
</html>
